{% macro stat_card(title, value, subtitle="", color="violet") %}
<div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 animate-fade-in">
  <p class="text-sm text-zinc-400 uppercase tracking-wider font-medium mb-3">{{ title }}</p>
  <div class="flex items-center gap-3">
    <div class="w-1 h-10 rounded-full
      {% if color == 'violet' %}bg-violet-500
      {% elif color == 'emerald' %}bg-emerald-500
      {% elif color == 'amber' %}bg-amber-500
      {% elif color == 'red' %}bg-red-500
      {% elif color == 'blue' %}bg-blue-500
      {% elif color == 'cyan' %}bg-cyan-500
      {% else %}bg-violet-500
      {% endif %}"></div>
    <p class="text-3xl font-bold text-white tabular-nums">{{ value }}</p>
  </div>
  {% if subtitle %}
  <p class="text-xs text-zinc-500 mt-3">{{ subtitle }}</p>
  {% endif %}
</div>
{% endmacro %}
