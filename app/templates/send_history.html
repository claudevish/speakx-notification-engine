{% extends "base.html" %}

{% block title %}Send History - SpeakX Notifications{% endblock %}
{% block page_title %}Send History{% endblock %}

{% block content %}
<div x-data="sendHistoryManager()" x-init="loadHistory(); loadDeliveryStats()">

  <!-- Section 1: Delivery Stats -->
  <div class="flex flex-wrap items-center gap-3 mb-6">
    <div class="bg-emerald-500/10 border border-emerald-500/20 rounded-lg px-4 py-2 flex items-center gap-2">
      <span class="text-sm text-emerald-400">Sent</span>
      <span class="text-emerald-300 font-bold tabular-nums" x-text="stats.total_sent ?? '...'"></span>
    </div>
    <div class="bg-red-500/10 border border-red-500/20 rounded-lg px-4 py-2 flex items-center gap-2">
      <span class="text-sm text-red-400">Failed</span>
      <span class="text-red-300 font-bold tabular-nums" x-text="stats.total_failed ?? '...'"></span>
    </div>
    <div class="bg-zinc-700/50 border border-zinc-600 rounded-lg px-4 py-2 flex items-center gap-2">
      <span class="text-sm text-zinc-400">Skipped (DND)</span>
      <span class="text-zinc-300 font-bold tabular-nums" x-text="stats.total_skipped_dnd ?? '...'"></span>
    </div>
    <div class="bg-amber-500/10 border border-amber-500/20 rounded-lg px-4 py-2 flex items-center gap-2">
      <span class="text-sm text-amber-400">Pending</span>
      <span class="text-amber-300 font-bold tabular-nums" x-text="stats.total_pending ?? '...'"></span>
    </div>
  </div>

  <!-- Section 2: Trigger Day 0 -->
  <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 mb-6">
    <h3 class="text-sm font-semibold text-zinc-300 uppercase tracking-wider mb-3">Trigger Day 0 Schedule</h3>
    <div class="flex flex-wrap items-end gap-3">
      <div>
        <label class="text-xs text-zinc-500 block mb-1">User Identity</label>
        <input type="text" x-model="triggerForm.identity" placeholder="+919876543210"
          class="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none focus:border-violet-500 w-52">
      </div>
      <div>
        <label class="text-xs text-zinc-500 block mb-1">Journey</label>
        <select x-model="triggerForm.journey_id"
          class="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-violet-500">
          <option value="">Select Journey</option>
          {% for j in journeys %}
          <option value="{{ j.id }}">{{ j.name }}</option>
          {% endfor %}
        </select>
      </div>
      <button @click="triggerDay0()" :disabled="!triggerForm.identity || !triggerForm.journey_id || triggerLoading"
        class="px-4 py-2 rounded-lg text-sm font-medium transition-colors disabled:opacity-40 disabled:cursor-not-allowed bg-violet-600 hover:bg-violet-500 text-white">
        <span x-show="!triggerLoading">Trigger Day 0</span>
        <span x-show="triggerLoading">Scheduling...</span>
      </button>
      <template x-if="triggerResult">
        <span class="text-xs text-emerald-400" x-text="triggerResult"></span>
      </template>
    </div>
  </div>

  <!-- Section 3: Filters -->
  <div class="flex flex-wrap items-center gap-3 mb-4">
    <select x-model="filters.status" @change="page=1; loadHistory()"
      class="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-violet-500">
      <option value="">All Statuses</option>
      <option value="sent">Sent</option>
      <option value="failed">Failed</option>
      <option value="skipped_dnd">Skipped (DND)</option>
    </select>
    <select x-model="filters.journey_id" @change="page=1; loadHistory()"
      class="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-violet-500">
      <option value="">All Journeys</option>
      {% for j in journeys %}
      <option value="{{ j.id }}">{{ j.name }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- Section 4: History Table -->
  <template x-if="!loading && items.length > 0">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-zinc-800 text-left">
            <th class="px-3 py-2 text-xs font-semibold text-zinc-500 uppercase">Status</th>
            <th class="px-3 py-2 text-xs font-semibold text-zinc-500 uppercase">Title</th>
            <th class="px-3 py-2 text-xs font-semibold text-zinc-500 uppercase">User</th>
            <th class="px-3 py-2 text-xs font-semibold text-zinc-500 uppercase">Theme</th>
            <th class="px-3 py-2 text-xs font-semibold text-zinc-500 uppercase">Scheduled For</th>
            <th class="px-3 py-2 text-xs font-semibold text-zinc-500 uppercase">Sent At</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="item in items" :key="item.id">
            <tr class="border-b border-zinc-800/50 hover:bg-zinc-800/30 transition-colors">
              <td class="px-3 py-3">
                <span class="px-2 py-0.5 rounded-full text-xs font-medium"
                  :class="{
                    'bg-emerald-500/10 text-emerald-400': item.delivery_status === 'sent',
                    'bg-red-500/10 text-red-400': item.delivery_status === 'failed',
                    'bg-zinc-700/50 text-zinc-400': item.delivery_status === 'skipped_dnd',
                  }"
                  x-text="item.delivery_status"></span>
              </td>
              <td class="px-3 py-3">
                <p class="text-zinc-200 font-medium truncate max-w-xs" x-text="item.title"></p>
                <p class="text-zinc-500 text-xs truncate max-w-xs" x-text="item.body"></p>
              </td>
              <td class="px-3 py-3 text-zinc-400 text-xs font-mono" x-text="Portal.truncate(item.user_id, 16)"></td>
              <td class="px-3 py-3">
                <span class="px-2 py-0.5 rounded-full text-xs font-medium bg-violet-500/10 text-violet-400" x-text="item.theme"></span>
              </td>
              <td class="px-3 py-3 text-zinc-400 text-xs" x-text="item.scheduled_for ? Portal.formatDate(item.scheduled_for) : '—'"></td>
              <td class="px-3 py-3 text-zinc-400 text-xs" x-text="item.sent_at ? Portal.formatDate(item.sent_at) : '—'"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>

  <!-- Empty state -->
  <template x-if="!loading && items.length === 0">
    <div class="flex flex-col items-center justify-center py-20 text-center">
      <svg class="w-12 h-12 text-zinc-700 mb-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4l12 12M4 16L16 4"/>
      </svg>
      <p class="text-zinc-500 text-sm">No sent notifications yet</p>
      <p class="text-zinc-600 text-xs mt-1">Trigger a Day 0 schedule or switch to live mode</p>
    </div>
  </template>

  <!-- Loading -->
  <template x-if="loading">
    <div class="space-y-3 mt-4">
      <template x-for="i in 5" :key="i">
        <div class="h-14 bg-zinc-900 border border-zinc-800 rounded-lg animate-pulse"></div>
      </template>
    </div>
  </template>

  <!-- Pagination -->
  <div class="flex justify-between items-center mt-6" x-show="total > 0">
    <p class="text-sm text-zinc-500">
      Showing <span class="text-zinc-300 font-medium" x-text="items.length"></span>
      of <span class="text-zinc-300 font-medium" x-text="total"></span>
    </p>
    <div class="flex items-center gap-2">
      <button @click="page--; loadHistory()" :disabled="page <= 1"
        class="px-3 py-1.5 text-sm rounded-lg border transition-colors disabled:opacity-30"
        :class="page <= 1 ? 'bg-zinc-900 border-zinc-800 text-zinc-600' : 'bg-zinc-800 border-zinc-700 text-zinc-300 hover:bg-zinc-700'">
        Previous
      </button>
      <span class="text-sm text-zinc-400 px-2">
        Page <span class="text-zinc-200" x-text="page"></span> of <span class="text-zinc-200" x-text="pages"></span>
      </span>
      <button @click="page++; loadHistory()" :disabled="page >= pages"
        class="px-3 py-1.5 text-sm rounded-lg border transition-colors disabled:opacity-30"
        :class="page >= pages ? 'bg-zinc-900 border-zinc-800 text-zinc-600' : 'bg-zinc-800 border-zinc-700 text-zinc-300 hover:bg-zinc-700'">
        Next
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function sendHistoryManager() {
  return {
    items: [],
    filters: { status: '', journey_id: '' },
    page: 1,
    pages: 1,
    total: 0,
    stats: {},
    loading: false,
    triggerForm: { identity: '', journey_id: '' },
    triggerLoading: false,
    triggerResult: '',

    async loadHistory() {
      this.loading = true;
      try {
        const params = new URLSearchParams();
        if (this.filters.status) params.set('status', this.filters.status);
        if (this.filters.journey_id) params.set('journey_id', this.filters.journey_id);
        params.set('page', this.page);
        params.set('limit', 20);
        const data = await Portal.get(`/send-history?${params}`);
        this.items = data.items;
        this.total = data.total;
        this.pages = data.pages;
      } catch (e) {
        this.items = [];
      }
      this.loading = false;
    },

    async loadDeliveryStats() {
      try {
        this.stats = await Portal.get('/delivery-stats');
      } catch (e) {
        this.stats = {};
      }
    },

    async triggerDay0() {
      this.triggerLoading = true;
      this.triggerResult = '';
      try {
        const result = await Portal.post('/trigger-day0', {
          identity: this.triggerForm.identity,
          journey_id: this.triggerForm.journey_id,
        });
        this.triggerResult = `Queued! Task: ${result.task_id}`;
        setTimeout(() => { this.loadHistory(); this.loadDeliveryStats(); }, 3000);
      } catch (e) {
        this.triggerResult = 'Error: ' + e.message;
      }
      this.triggerLoading = false;
    },
  };
}
</script>
{% endblock %}
